<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>상품 수정 - HanSung</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    .navbar { background: linear-gradient(90deg, #1a1a2e, #0f3460); }
    .navbar-brand { font-weight: 800; color: #e94560 !important; font-size: 1.4rem; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark mb-4">
  <div class="container">
    <a class="navbar-brand" th:href="@{/home}">HanSung</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" th:href="@{/home}">홈</a></li>
        <li class="nav-item"><a class="nav-link active" th:href="@{/products}">상품 목록</a></li>
      </ul>
      <form th:action="@{/logout}" method="post" class="d-flex">
        <button class="btn btn-outline-light btn-sm px-3">로그아웃</button>
      </form>
    </div>
  </div>
</nav>

<div class="container" style="max-width:600px">
  <h4 class="fw-bold mb-4">상품 수정</h4>

  <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

  <form th:action="@{/products/{id}/edit(id=${productId})}" th:object="${productDto}" method="post">
    <div class="mb-3">
      <label class="form-label fw-semibold">상품명</label>
      <input type="text" class="form-control" th:field="*{name}" placeholder="상품명 입력"/>
      <div class="text-danger small" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">가격</label>
      <input type="number" class="form-control" th:field="*{price}" placeholder="가격 입력"/>
      <div class="text-danger small" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">재고</label>
      <input type="number" class="form-control" th:field="*{stock}" placeholder="재고 입력"/>
      <div class="text-danger small" th:if="${#fields.hasErrors('stock')}" th:errors="*{stock}"></div>
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">설명</label>
      <textarea class="form-control" th:field="*{description}" rows="3" placeholder="상품 설명 입력"></textarea>
    </div>
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary px-4">수정 완료</button>
      <a th:href="@{/products}" class="btn btn-outline-secondary">취소</a>
    </div>
  </form>
</div>

<!-- 실습 증적 푸터 -->
<footer class="text-center mt-5 py-3 text-muted border-top">
  실습 수행 일시: <span id="datetime"></span> &nbsp;│&nbsp; 학번: 2371063 &nbsp;│&nbsp; 성명: 장성민
</footer>
<script>
  function updateTime() {
    const now = new Date();
    const days = ['일','월','화','수','목','금','토'];
    const str = now.getFullYear() + '년 ' +
            (now.getMonth()+1) + '월 ' +
            now.getDate() + '일 (' + days[now.getDay()] + ') ' +
            String(now.getHours()).padStart(2,'0') + ':' +
            String(now.getMinutes()).padStart(2,'0') + ':' +
            String(now.getSeconds()).padStart(2,'0');
    document.getElementById('datetime').textContent = str;
  }
  updateTime();
  setInterval(updateTime, 1000);
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
